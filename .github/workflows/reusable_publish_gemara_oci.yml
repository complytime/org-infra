# Reusable Publish Gemara OCI bundle (GHCR)
# =========================================
# Packs a Gemara policy bundle with the go-gemara SDK via a pinned composite
# action, then applies the same SLSA + SPDX attestation flow as
# reusable_publish_oras.yml (ORAS CLI path). Consumers get digest + image
# outputs for reusable_sign_and_verify and resuable_publish_quay.
#
# The composite action reference is a static `uses:` pin (GHA does not support
# dynamic action refs). Bump the pin in this file when the action or SDK
# contract changes; see also complytime-policies FR-006.
#
# Prerequisite: allow_unprotected_ref / ref_protected policy must align with
# reusable_sign_and_verify.yml (same allow_unprotected_ref input).

name: Reusable Publish Gemara OCI

"on":
  workflow_call:
    inputs:
      image_name:
        description: 'Image name without registry (e.g. org/bundle-name, lower case)'
        required: true
        type: string
      oci_tag:
        description: 'Tag to push to GHCR (e.g. v0.1.0 or sha-abc123, must match promote source_tag)'
        required: true
        type: string
      bundle_file:
        description: 'Path to root Gemara YAML relative to working_directory'
        required: true
        type: string
      working_directory:
        description: 'Directory under the repo root to resolve paths'
        required: false
        default: '.'
        type: string
      validate:
        description: 'If true, validate the root document before pack'
        required: false
        default: 'true'
        type: string
      sbom_scan_path:
        description: 'Path passed to anchore/sbom-action for directory scan'
        required: false
        default: '.'
        type: string
      image_description:
        description: 'org.opencontainers.image.description (not set on bundle; reserved for future)'
        required: false
        type: string
        default: ''
      allow_unprotected_ref:
        description: >-
          If true, run on unprotected refs (e.g. fork main). Set false in production orgs;
          must match reusable_sign_and_verify allow_unprotected_ref.
        required: false
        default: false
        type: boolean
    outputs:
      digest:
        description: 'Pushed image digest (sha256:...)'
        value: ${{ jobs.publish.outputs.digest }}
      image:
        description: 'Full ghcr.io/... name'
        value: ${{ jobs.publish.outputs.image }}
      oci_tag:
        description: 'Tag that was pushed (copy of input)'
        value: ${{ jobs.publish.outputs.oci_tag }}

permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  actions: none

concurrency:
  group: reusable-gemara-${{ inputs.image_name }}-${{ inputs.oci_tag }}
  cancel-in-progress: true

jobs:
  publish:
    if: ${{ github.ref_protected || inputs.allow_unprotected_ref }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.norm_digest.outputs.digest }}
      image: ${{ steps.image_out.outputs.image }}
      oci_tag: ${{ inputs.oci_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image ref (no registry in image_name)
        id: image_out
        run: |
          echo "image=ghcr.io/${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"

      # Pinned action ref — update in sync with go-gemara / Gemara policy bundle contract.
      - name: Pack and push Gemara bundle
        id: gemara
        # yamllint disable-line rule:line-length
        uses: sonupreetam/gemara-publish-oci@7203d6158a16208a0338cc33ea001bb077f4705c
        with:
          registry: ghcr.io
          repository: ${{ inputs.image_name }}
          tag: ${{ inputs.oci_tag }}
          file: ${{ inputs.bundle_file }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          validate: ${{ inputs.validate }}
          working_directory: ${{ inputs.working_directory }}

      - name: Normalize digest for attestation
        id: norm_digest
        env:
          RAW: ${{ steps.gemara.outputs.digest }}
        run: |
          D="${RAW}"
          if [[ ! "$D" == sha256:* ]]; then
            D="sha256:$D"
          fi
          echo "digest=$D" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA provenance
        if: ${{ github.ref_protected || inputs.allow_unprotected_ref }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image_out.outputs.image }}
          subject-digest: ${{ steps.norm_digest.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: ${{ github.ref_protected || inputs.allow_unprotected_ref }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.sbom_scan_path }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: ${{ github.ref_protected || inputs.allow_unprotected_ref }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.image_out.outputs.image }}
          subject-digest: ${{ steps.norm_digest.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
