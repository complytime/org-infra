# Reusable Publish OCI: Gemara policy bundle (GHCR)
# ===============================================
# Packs a Gemara root bundle with the pinned oci-artifact (gemara-publish-oci) composite
# and the same SLSA + SPDX attestation path as the former org design.
#
# The historical ORAS-CLI "per path:mediatype" mode is removed (org standard is go-gemara
# + composite per oci-artifact). For loose-file experiments use a caller-local job or
# a dedicated legacy workflow, not this reusable.
# Downstream: reusable_sign_and_verify (verify_vuln: false for YAML-only); resuable_publish_quay.

name: Reusable Publish OCI (Gemara bundle)

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name without registry (e.g., org/bundle-name, lower case)'
        required: true
        type: string
      oci_tag:
        description: 'Tag to push to GHCR (e.g., v0.1.0 or sha-abc123); use as promote source_tag'
        required: true
        type: string
      bundle_file:
        description: 'Path to root Gemara YAML relative to working_directory'
        required: true
        type: string
      working_directory:
        description: 'Directory under the repo root to resolve paths'
        required: false
        type: string
        default: "."
      validate:
        description: 'If true, validate the root document before pack'
        required: false
        type: string
        default: "true"
      sbom_scan_path:
        description: "Path for anchore/sbom-action"
        required: false
        type: string
        default: "."
    outputs:
      digest:
        description: "Pushed image digest (sha256:...)"
        value: ${{ jobs.publish.outputs.digest }}
      image:
        description: "Full ghcr.io/.../name (no tag)"
        value: ${{ jobs.publish.outputs.image }}
      sha_tag:
        description: "Tag used for push (equals oci_tag)"
        value: ${{ jobs.publish.outputs.sha_tag }}
      oci_tag:
        description: "Same as input oci_tag (promote source_tag)"
        value: ${{ jobs.publish.outputs.oci_tag }}

permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  actions: none

concurrency:
  group: reusable-gemara-${{ inputs.image_name }}-${{ inputs.oci_tag }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.ref_protected
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.export_digest.outputs.digest }}
      image: ${{ steps.image_out.outputs.image }}
      sha_tag: ${{ steps.export_tags.outputs.sha_tag }}
      oci_tag: ${{ steps.export_tags.outputs.oci_tag }}
    steps:
      - name: Validate inputs
        env:
          OCI_TAG: ${{ inputs.oci_tag }}
          BUNDLE: ${{ inputs.bundle_file }}
        run: |
          set -e
          if [ -z "$OCI_TAG" ] || [ -z "$BUNDLE" ]; then
            echo '::error::oci_tag and bundle_file are required'
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (ghcr.io/…)
        id: image_out
        run: |
          echo "image=ghcr.io/${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Pack and push Gemara bundle
        id: pack_gemara
        # yamllint disable-line rule:line-length
        uses: sonupreetam/gemara-publish-oci@7203d6158a16208a0338cc33ea001bb077f4705c
        with:
          registry: ghcr.io
          repository: ${{ inputs.image_name }}
          tag: ${{ inputs.oci_tag }}
          file: ${{ inputs.bundle_file }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          validate: ${{ inputs.validate }}
          working_directory: ${{ inputs.working_directory }}

      - name: Normalize digest
        id: digest_gemara
        env:
          RAW: ${{ steps.pack_gemara.outputs.digest }}
        run: |
          D="${RAW}"
          if [[ ! "$D" == sha256:* ]]; then
            D="sha256:$D"
          fi
          echo "digest=$D" >> "$GITHUB_OUTPUT"

      - name: Export digest
        id: export_digest
        if: ${{ steps.digest_gemara.outcome == 'success' }}
        run: |
          echo "digest=${{ steps.digest_gemara.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Export tags
        id: export_tags
        if: ${{ steps.export_digest.outcome == 'success' }}
        env:
          T: ${{ inputs.oci_tag }}
        run: |
          echo "sha_tag=$T" >> "$GITHUB_OUTPUT"
          echo "oci_tag=$T" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA provenance
        if: ${{ steps.export_digest.outcome == 'success' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image_out.outputs.image }}
          subject-digest: ${{ steps.export_digest.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: ${{ steps.export_digest.outcome == 'success' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.sbom_scan_path }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: ${{ steps.export_digest.outcome == 'success' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.image_out.outputs.image }}
          subject-digest: ${{ steps.export_digest.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
