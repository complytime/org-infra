---
# Configuration file for sync-org-repositories.py
# This file defines which files and workflows should be synchronized
# across all organization repositories.

# Repositories to exclude from synchronization
# org-infra is excluded by default as it's the source repository
exclude_repos:
  - org-infra                   # This repository itself
  - website                     # Managed independently
  - nunya                       # Internal tooling (Jira migration)
  - roadmap                     # Internal tooling (roadmap scripts)

# Files and workflows to synchronize
# Each entry specifies:
#   - source: Path relative to org-infra repository root
#   - destination: (optional) Path in target repo, defaults to same as source
#   - exclude_repos: (optional) List of repositories to skip for this file
files_to_sync:
  # GitHub Workflows
  - source: .github/workflows/ci_checks.yml
    destination: .github/workflows/ci_checks.yml

  - source: .github/workflows/ci_dependencies.yml
    destination: .github/workflows/ci_dependencies.yml

  - source: .github/workflows/ci_scheduled.yml
    destination: .github/workflows/ci_scheduled.yml

  - source: .github/workflows/ci_security.yml
    destination: .github/workflows/ci_security.yml
    vars:
      enable_trivy_source:
        default: "false"
        repos:
          complyctl: "true"
          complytime: "true"
          complytime-providers: "true"
          complytime-collector-components: "true"
          gemara-content-service: "true"
          complyscribe: "true"

  - source: .github/workflows/ci_crapload.yml
    destination: .github/workflows/ci_crapload.yml
    exclude_repos:
      - complyscribe
      - complytime-demos
      - complytime-policies
      - community

  # Configuration Files
  - source: .mega-linter.yml
    destination: .mega-linter.yml
    exclude_repos:
      - complytime-collector-components

  - source: .yamllint.yml
    destination: .yamllint.yml
    exclude_repos:
      - complyscribe

  - source: commitlint.config.js
    destination: commitlint.config.js

  - source: .golangci.yml
    destination: .golangci.yml
    exclude_repos:
      - complyscribe
      - complytime-demos
      - complytime-policies

  - source: ruff.toml
    destination: ruff.toml
    exclude_repos:
      - .github
      - complyctl
      - complytime
      - complytime-collector-components
      - complytime-providers
      - gemara-content-service

  # AI Tooling
  - source: .specify/memory/constitution.md
    destination: .specify/memory/constitution.md
    exclude_repos:
      - .github
      - complyscribe

  - source: docs/AI_TOOLING.md
    destination: docs/AI_TOOLING.md
    exclude_repos:
      - .github
      - complyscribe

  - source: .agents/skills/.gitkeep
    destination: .agents/skills/.gitkeep
    exclude_repos:
      - .github
      - complyscribe

  - source: .opencode/command/review_pr.md
    destination: .opencode/command/review_pr.md
    exclude_repos:
      - .github
      - complyscribe

  # GitHub Templates
  - source: .github/pull_request_template.md
    destination: .github/pull_request_template.md

  - source: .github/ISSUE_TEMPLATE/bug_report.md
    destination: .github/ISSUE_TEMPLATE/bug_report.md

  - source: .github/ISSUE_TEMPLATE/feature_request.md
    destination: .github/ISSUE_TEMPLATE/feature_request.md

# Dependabot configuration
# Common entries are applied to all repos (unless excluded).
# Overrides add or replace entries for specific repos (keyed by package-ecosystem).
# Entries in target repos for ecosystems NOT listed here are preserved.
dependabot:
  common:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "daily"
      commit-message:
        prefix: "ci"
        include: "scope"

    - package-ecosystem: "pre-commit"
      directory: "/"
      schedule:
        interval: "weekly"
      commit-message:
        prefix: "chore"
        include: "scope"

  overrides:
    complyctl:
      - package-ecosystem: "github-actions"
        directories:
          - "/"
          - "/.github/actions/setup-complyctl"
        schedule:
          interval: "daily"
        commit-message:
          prefix: "ci"
          include: "scope"
      - package-ecosystem: "gomod"
        directories:
          - "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    complytime-collector-components:
      - package-ecosystem: "gomod"
        directories:
          - "/proofwatch"
          - "/truthbeam"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    complytime:
      - package-ecosystem: "gomod"
        directory: "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    complytime-providers:
      - package-ecosystem: "gomod"
        directory: "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    gemara-content-service:
      - package-ecosystem: "gomod"
        directory: "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    complyscribe:
      - package-ecosystem: "github-actions"
        directories:
          - "/"
          - "/.github/actions/e2e-testing"
          - "/.github/actions/publish-image"
          - "/.github/actions/setup-poetry"
        schedule:
          interval: "daily"
        commit-message:
          prefix: "ci"
          include: "scope"
      - package-ecosystem: "pip"
        directory: "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    complytime-demos:
      - package-ecosystem: "pip"
        directory: "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

    complytime-policies:
      - package-ecosystem: "pip"
        directory: "/"
        schedule:
          interval: "weekly"
        open-pull-requests-limit: 10
        commit-message:
          prefix: "chore"
          include: "scope"

  exclude_repos:
    - .github
    - community

# Default branch name for creating PRs
default_base_branch: main
